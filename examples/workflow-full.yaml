# Initial migration: full export and first-time migrate
# Use this for the FIRST run. Runs: extract source → map members → migrate.
#
# Run:  deno task workflow examples/workflow-full.yaml
#   or: deno task workflow -f examples/workflow-full.yaml

workflow:
  steps:
    - extract-source
    - map-members
    - migrate

source:
  projectKey: Aman-Migration-Test
  domain: app.launchdarkly.com  # Optional: Defaults to app.launchdarkly.com

destination:
  projectKey: aman-migration-2
  domain: app.launchdarkly.com  # Optional: Use app.eu.launchdarkly.com for EU instance

# Extract segments so they can be migrated (needed when migrateSegments: true)
extraction:
  includeSegments: true

# Optional: Configure member mapping output location
memberMapping:
  outputFile: data/launchdarkly-migrations/mappings/maintainer_mapping.json

# Migration configuration
migration:
  assignMaintainerIds: true
  migrateSegments: true
  # conflictPrefix: "us-"
  # targetView: "us-migration-2024"
  environments:
    - production
    - test
  environmentMapping:
    production: production
    test: test
    #staging: staging

  # Optional: Migrate only these flags (includeFlags). If set, only these keys are migrated.
  includeFlags:
     - Config-welcome-message

  # Optional: Exclude these flags from migration (excludeFlags).
  # excludeFlags:
  #   - deprecated-flag
  #   - experimental-feature

  # Optional: Migrate up to N flags in parallel (default: 10). Speeds up large migrations.
  # concurrency: 10

